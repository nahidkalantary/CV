name: Build CV PDF

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Create docs folder
        run: |
          mkdir -p docs
          cp main.pdf docs/Nahid_Kalantaryardebily_CV.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update CV PDF
          file_pattern: docs/Nahid_Kalantaryardebily_CV.pdf
